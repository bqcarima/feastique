spring.application.name=feastique


spring.datasource.url = jdbc:postgresql://localhost:5432/feastique
spring.datasource.username = postgres
spring.datasource.password = password
spring.security.user.password = password

jwt.secret = ${JWT_SECRET}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation = true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy = org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.physical_naming_strategy = org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl

spring.jpa.hibernate.ddl-auto = update
spring.datasource.hikari.read-only = false
spring.datasource.hikari.auto-commit = true

#spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# show our filter logs
logging.level.com.qinet.feastique.config.JwtAuthenticationFilter=INFO
# show spring-security decisions if you want