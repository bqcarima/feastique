spring.application.name=feastique


spring.datasource.url = jdbc:postgresql://localhost:5432/feastique
spring.datasource.username = postgres
spring.datasource.password = password
spring.security.user.password = password

#spring.datasource.url = ${DB_URL}
#spring.datasource.username = ${DB_USERNAME}
#spring.datasource.password = ${DB_PASSWORD}
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.hikari.data-source-properties.ssl=true

jwt.secret = ${JWT_SECRET}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation = true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy



# (Recommended) Validate schema instead of auto-updating while testing the change
spring.jpa.hibernate.ddl-auto= update

spring.datasource.hikari.read-only = false
spring.datasource.hikari.auto-commit = true

#spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# show our filter logs
logging.level.com.qinet.feastique.config.JwtAuthenticationFilter=INFO
# show spring-security decisions if you want

logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Tell Hibernate to use Spring?s improved snake_case naming

# (Optional) Use a consistent implicit naming strategy too
#spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
