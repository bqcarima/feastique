spring.application.name=feastique


spring.datasource.url = jdbc:postgresql://localhost:5432/feastique
spring.datasource.username = postgres
spring.datasource.password = password
spring.security.user.password = password

jwt.secret = ${JWT_SECRET}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation = true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy = org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.physical_naming_strategy = org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl

spring.jpa.hibernate.ddl-auto = create-drop
spring.datasource.hikari.read-only = false
spring.datasource.hikari.auto-commit = true